// ── 工具函数 ──────────────────────────────────────────
function fmt(n) {
  if (n == null) return '—';
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  return n.toLocaleString();
}

let currentTab = 'shanghai';
let map = null;
let markers = [];
let geocodeCache = {};
let activeItem = null;

// ── Tab 切换 ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'shanghai') || (i === 1 && tab === 'national'));
  });
  document.getElementById('sidebar-header-shanghai').classList.toggle('hidden', tab !== 'shanghai');
  document.getElementById('sidebar-header-national').classList.toggle('hidden', tab !== 'national');
  renderList();
  loadMarkers();
}

// ── 侧边栏渲染 ────────────────────────────────────────
function renderList() {
  const list = document.getElementById('poi-list');
  const data = currentTab === 'shanghai' ? shanghaiData : nationalData;
  list.innerHTML = data.map((d, i) => {
    const rankLabel = currentTab === 'shanghai' ? d.rank : d.province;
    const rankClass = currentTab === 'shanghai' ? '' : 'national';
    const rankDisplay = currentTab === 'shanghai' ? d.rank : (i + 1);
    const subtext = currentTab === 'shanghai'
      ? `<span>${d.type}</span><span>发帖 ${fmt(d.posts)}</span>`
      : `<span>${d.city}</span><span>${d.type}</span><span>发帖 ${fmt(d.posts)}</span>`;
    return `
      <div class="poi-item" id="item-${i}" onclick="onItemClick(${i})">
        <div class="poi-rank ${rankClass}">${rankDisplay}</div>
        <div class="poi-info">
          <div class="poi-name">${d.name}</div>
          <div class="poi-meta">${subtext}</div>
        </div>
        <div class="poi-stat">互动 ${fmt(d.engagement)}</div>
      </div>
    `;
  }).join('');
}

// ── 弹窗 ─────────────────────────────────────────────
function showPopup(d, isNational) {
  document.getElementById('popup-rank').textContent = isNational ? d.province : `上海TOP ${d.rank}`;
  document.getElementById('popup-name').textContent = d.name;
  document.getElementById('popup-type').textContent = (isNational ? d.city + ' · ' : '') + d.type;
  document.getElementById('popup-posts').textContent = fmt(d.posts);
  document.getElementById('popup-creators').textContent = fmt(d.creators);
  document.getElementById('popup-post-title').textContent = d.title;
  document.getElementById('popup-engagement').textContent = `互动量 ${fmt(d.engagement)}`;
  document.getElementById('popup-link').href = d.link;
  document.getElementById('popup-overlay').classList.add('show');
}

function closePopup(e) {
  if (e.target === document.getElementById('popup-overlay')) {
    document.getElementById('popup-overlay').classList.remove('show');
  }
}
function closePopupBtn() {
  document.getElementById('popup-overlay').classList.remove('show');
}

// ── 侧边栏点击 ───────────────────────────────────────
function onItemClick(idx) {
  const data = currentTab === 'shanghai' ? shanghaiData : nationalData;
  const d = data[idx];
  // 高亮侧边栏
  document.querySelectorAll('.poi-item').forEach(el => el.classList.remove('active'));
  document.getElementById('item-' + idx).classList.add('active');
  // 弹窗
  showPopup(d, currentTab === 'national');
  // 地图飞行
  if (markers[idx] && markers[idx].lnglat) {
    map.setCenter(markers[idx].lnglat);
    map.setZoom(currentTab === 'shanghai' ? 15 : 6);
  }
}

// ── 地图 Marker ───────────────────────────────────────
function loadMarkers() {
  // 清除旧 marker
  markers.forEach(m => { if (m.marker) m.marker.remove(); });
  markers = [];

  const data = currentTab === 'shanghai' ? shanghaiData : nationalData;
  const isNational = currentTab === 'national';

  if (isNational) {
    map.setCenter([105, 36]);
    map.setZoom(4);
  } else {
    map.setCenter([121.48, 31.23]);
    map.setZoom(11);
  }

  // 批量地理编码
  data.forEach((d, idx) => {
    const key = d.addr;
    if (geocodeCache[key]) {
      placeMarker(d, idx, geocodeCache[key], isNational);
    } else {
      AMap.plugin('AMap.Geocoder', function() {
        const geocoder = new AMap.Geocoder({ city: d.city || '全国' });
        geocoder.getLocation(d.addr, function(status, result) {
          let lnglat = null;
          if (status === 'complete' && result.geocodes.length > 0) {
            lnglat = result.geocodes[0].location;
            geocodeCache[key] = lnglat;
          }
          placeMarker(d, idx, lnglat, isNational);
        });
      });
    }
  });
}

function placeMarker(d, idx, lnglat, isNational) {
  if (!lnglat) return;
  const isShanghai = !isNational;

  // 颜色按发帖量分级
  const posts = d.posts || 0;
  let color, size;
  if (isShanghai) {
    if (idx < 3) { color = '#ff2442'; size = 18; }
    else if (idx < 10) { color = '#ff6b35'; size = 14; }
    else { color = '#ffaa44'; size = 11; }
  } else {
    if (posts > 500000) { color = '#ff2442'; size = 16; }
    else if (posts > 200000) { color = '#ff6b35'; size = 13; }
    else { color = '#ffaa44'; size = 10; }
  }

  const content = `
    <div style="
      width:${size*2}px; height:${size*2}px;
      background:${color};
      border:3px solid white;
      border-radius:50%;
      box-shadow:0 2px 8px rgba(0,0,0,0.3);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      color:white; font-size:${size > 13 ? 12 : 10}px; font-weight:700;
    ">${isShanghai ? d.rank : ''}</div>
  `;

  const marker = new AMap.Marker({
    position: lnglat,
    content: content,
    offset: new AMap.Pixel(-size, -size),
    title: d.name,
  });

  marker.on('click', function() {
    document.querySelectorAll('.poi-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById('item-' + idx);
    if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    showPopup(d, isNational);
  });

  // hover label
  const label = new AMap.InfoWindow({
    content: `<div style="padding:4px 8px;font-size:12px;white-space:nowrap;border-radius:6px">${d.name}</div>`,
    offset: new AMap.Pixel(0, -size*2 - 4),
    closeWhenClickMap: true,
    isCustom: true,
  });
  marker.on('mouseover', () => label.open(map, lnglat));
  marker.on('mouseout', () => label.close());

  marker.setMap(map);
  markers[idx] = { marker, lnglat };
}

// ── 地图初始化 ────────────────────────────────────────
window._initMap = function() {
  map = new AMap.Map('map', {
    zoom: 11,
    center: [121.48, 31.23],
    mapStyle: 'amap://styles/whitesmoke',
  });
  renderList();
  loadMarkers();
};
</script>
