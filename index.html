function fmt(n) {
  if (n == null) return '—';
  if (n >= 10000) return (n/10000).toFixed(1)+'万';
  return n.toLocaleString();
}

let tab = 'shanghai';
let map, markers = [];

function switchTab(t) {
  tab = t;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='shanghai')||(i===1&&t==='national')));
  document.getElementById('sh-header').classList.toggle('hidden', t!=='shanghai');
  document.getElementById('na-header').classList.toggle('hidden', t!=='national');
  renderList();
  renderMarkers();
}

function renderList() {
  const data = tab==='shanghai' ? SH : NA;
  document.getElementById('poi-list').innerHTML = data.map((d,i) => {
    const rankCls = tab==='shanghai' ? (i<3?'top3':i<10?'top10':'others') : 'national';
    const rankTxt = tab==='shanghai' ? d.rank : (i+1);
    const meta = tab==='shanghai'
      ? `${d.type} · 发帖${fmt(d.posts)}`
      : `${d.city} · ${d.type} · 发帖${fmt(d.posts)}`;
    return `<div class="poi-item" id="item-${i}" onclick="onItem(${i})">
      <div class="poi-rank ${rankCls}">${rankTxt}</div>
      <div class="poi-info">
        <div class="poi-name">${d.name}</div>
        <div class="poi-meta">${meta}</div>
      </div>
      <div class="poi-stat">互动${fmt(d.eng)}</div>
    </div>`;
  }).join('');
}

function showPopup(d, isNA) {
  document.getElementById('p-badge').textContent = isNA ? d.province : `上海 TOP${d.rank}`;
  document.getElementById('p-name').textContent = d.name;
  document.getElementById('p-type').textContent = (isNA ? d.city+' · ' : '') + d.type;
  document.getElementById('p-posts').textContent = fmt(d.posts);
  document.getElementById('p-creators').textContent = fmt(d.creators);
  document.getElementById('p-title').textContent = d.title;
  document.getElementById('p-eng').textContent = `互动量 ${fmt(d.eng)}`;
  document.getElementById('p-link').href = d.link;
  document.getElementById('overlay').classList.add('show');
}
function closePop(e) { if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('show'); }

function onItem(idx) {
  const data = tab==='shanghai' ? SH : NA;
  document.querySelectorAll('.poi-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('item-'+idx).classList.add('active');
  showPopup(data[idx], tab==='national');
  map.setCenter([data[idx].lng, data[idx].lat]);
  map.setZoom(tab==='shanghai' ? 15 : 7);
}

function renderMarkers() {
  markers.forEach(m => m && map.remove(m));
  markers = [];
  const data = tab==='shanghai' ? SH : NA;
  const isNA = tab==='national';

  if (isNA) { map.setCenter([105,36]); map.setZoom(4); }
  else { map.setCenter([121.48,31.22]); map.setZoom(11); }

  data.forEach((d, idx) => {
    // 颜色和大小
    let color, size;
    if (!isNA) {
      if (idx < 3)       { color='#ff2442'; size=20; }
      else if (idx < 10) { color='#ff6b35'; size=16; }
      else               { color='#ffaa44'; size=13; }
    } else {
      const p = d.posts||0;
      if (p>500000)      { color='#ff2442'; size=18; }
      else if (p>200000) { color='#ff6b35'; size=14; }
      else               { color='#ffaa44'; size=11; }
    }

    const div = document.createElement('div');
    div.className = 'my-marker';
    div.style.cssText = `width:${size*2}px;height:${size*2}px;background:${color};font-size:${size>14?12:10}px;`;
    div.textContent = isNA ? '' : d.rank;

    const marker = new AMap.Marker({
      position: new AMap.LngLat(d.lng, d.lat),
      content: div,
      offset: new AMap.Pixel(-size, -size),
      zIndex: 100 - idx,
    });

    div.addEventListener('click', () => {
      document.querySelectorAll('.poi-item').forEach(el=>el.classList.remove('active'));
      const el = document.getElementById('item-'+idx);
      if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
      showPopup(d, isNA);
    });

    // hover 名称提示
    div.addEventListener('mouseenter', () => {
      const tip = document.createElement('div');
      tip.id = 'map-tip';
      tip.style.cssText = 'position:fixed;background:rgba(0,0,0,0.75);color:white;padding:4px 10px;border-radius:6px;font-size:12px;pointer-events:none;z-index:9998;white-space:nowrap;';
      tip.textContent = d.name;
      document.body.appendChild(tip);
    });
    div.addEventListener('mousemove', (e) => {
      const tip = document.getElementById('map-tip');
      if (tip) { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-28)+'px'; }
    });
    div.addEventListener('mouseleave', () => {
      const tip = document.getElementById('map-tip');
      if (tip) tip.remove();
    });

    map.add(marker);
    markers[idx] = marker;
  });
}

window._initMap = function() {
  map = new AMap.Map('map', {
    zoom: 11,
    center: [121.48, 31.22],
    mapStyle: 'amap://styles/whitesmoke',
  });
  renderList();
  renderMarkers();
};
